# =========================================================
# configs/dashboard.yaml — Operations dashboard config
# =========================================================

dashboard:
  host: "0.0.0.0"
  port: 8080
  debug: false
  reload: false

  # Authentication
  auth:
    enabled: true
    session_expire_minutes: 60

  # Freqtrade API connection
  freqtrade_api:
    base_url: "http://127.0.0.1:8081"
    timeout_seconds: 10
    poll_interval_seconds: 5

  # Panel refresh rates (seconds)
  refresh:
    bot_status: 5
    pnl: 10
    risk: 5
    positions: 5
    audit_log: 30
    promotion: 60
    drift: 60

  # Mode display — ALWAYS read-only, NEVER a toggle
  mode_display:
    read_only: true
    show_warning_if_real: true

  # Audit log display
  audit_log:
    max_events_displayed: 200
    auto_refresh: true
