version: "3.9"

# =========================================================
# Panda Trading Bot — Docker Compose
# Services: freqtrade, dashboard, prometheus, grafana, redis
# =========================================================

services:

  freqtrade:
    build:
      context: ./freqtrade
      dockerfile: Dockerfile
    container_name: panda_freqtrade
    restart: unless-stopped
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./configs:/freqtrade/configs:ro
    env_file: .env
    ports:
      - "${FREQTRADE_API_PORT:-8081}:8080"
    command: >
      trade
      --config /freqtrade/configs/base.yaml
      --config /freqtrade/configs/paper.yaml
      --strategy ${FREQTRADE_STRATEGY:-GridTrendV1}
      --userdir /freqtrade/user_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: panda_dashboard
    restart: unless-stopped
    volumes:
      - ./custom_app:/app/custom_app:ro
      - ./configs:/app/configs:ro
      - ./data:/app/data
    env_file: .env
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    depends_on:
      - freqtrade
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: panda_prometheus
    restart: unless-stopped
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: panda_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  redis:
    image: redis:7-alpine
    container_name: panda_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

volumes:
  prometheus_data:
  grafana_data:
  redis_data:
